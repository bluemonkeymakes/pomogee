services:
  app:
    build: .
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.pomogee.rule=Host(`pomogee.bluemonkeymakes.app`)
      - traefik.http.routers.pomogee.entrypoints=websecure
      - traefik.http.routers.pomogee.tls=true
      - traefik.http.routers.pomogee.tls.certresolver=letsencrypt
      - traefik.http.services.pomogee.loadbalancer.server.port=80
    networks:
      - proxy

networks:
  proxy:
    external: true
